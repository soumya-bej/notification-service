<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- 🔄 Auto Refresh every 5 seconds -->
    <meta http-equiv="refresh" content="5">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px 15px;
            border: 1px solid black;
        }

        h1 {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<h1>Notifications</h1>

<table>
<tr>
<th>ID</th><th>User</th><th>Channel</th><th>Status</th>
</tr>

{% for n in notifications %}
<tr>
<td>{{ n.id }}</td>
<td>{{ n.user_id }}</td>
<td>{{ n.channel }}</td>
<td>{{ n.status }}</td>
</tr>
{% endfor %}
</table>

<h1>Preferences</h1>

<table>
<tr><th>User</th><th>Preferences</th></tr>

{% for p in preferences %}
<tr>
<td>{{ p.user_id }}</td>
<td>{{ p.preferences }}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
